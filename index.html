<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chand Raat & Eid Mubarak</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="stars-container" id="starsContainer"></div>

    <div class="main-content">
        <div class="moon-wrapper" id="moonWrapper">
            <div class="moon" id="moon"></div>
            <div class="moon-glow"></div>
            <p class="hint">Click the Moon for a Surprise ✨</p>
        </div>

        <div class="intro-text" id="introText">
            <h1 class="fade-in">Chand Raat Mubarak</h1>
            <h1 class="fade-in delays-1 stylish-sub">to My Moon 🌙</h1>
            <h2 class="fade-in delays-2">Wishes from Hammad Hami</h2>
        </div>
    </div>

    <div id="surpriseLayer" class="surprise-layer">
        <div id="surpriseContainer" class="surprise-container">
            <h1 id="mainHeading" class="typing-heading"></h1>
            <p id="wishText" class="typing-wish"></p>
            <div id="giftContainer" class="gift-reveal">
                <p class="from-text">Yeh booket meri tarf sy gift 🤭</p>
                <img src="bouquet_user.jpg" alt="Flower Bouquet" class="flower-bouquet-img">
                <p id="giftSubtext" class="gift-subtext">yeh apky liyeh (chahy Gift Smj lijyeh😜)</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
